<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Dark background circle -->
  <circle cx="50" cy="50" r="48" fill="#060d1a" stroke="#22c55e" stroke-width="3"/>
  <!-- Inner glow ring -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="#22c55e" stroke-width="0.5" opacity="0.3"/>
  <!-- AQI text -->
  <text x="50" y="44"
        font-family="'Space Grotesk', Arial, sans-serif"
        font-weight="800" font-size="22"
        fill="#ffffff" text-anchor="middle"
        letter-spacing="2">AQI</text>
  <!-- Lightning bolt -->
  <text x="50" y="65"
        font-family="Arial" font-size="20"
        text-anchor="middle">&#x26A1;</text>
  <!-- Bottom tagline -->
  <text x="50" y="78"
        font-family="'JetBrains Mono', monospace"
        font-size="6" fill="#22c55e"
        text-anchor="middle" letter-spacing="1.5">INDIA</text>
</svg>
